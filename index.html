<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pago Nube Onboarding</title>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <script>
      // Restaura path após redirect do 404.html (GitHub Pages SPA routing).
      // Só aplica se o redirect for do MESMO origin — evita sobrescrever o URL em
      // localhost com um path guardado de outro deploy (ex.: GitHub Pages).
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (!redirect || redirect === location.href) return;
        try {
          var url = new URL(redirect);
          if (url.origin !== location.origin) return;
          var path = url.pathname + url.search + url.hash;
          if (path && path !== '/') {
            history.replaceState(null, null, path);
          }
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Disponível em todo o job (build embute a senha no bundle).
    env:
      VITE_APP_ACCESS_PASSWORD: ${{ secrets.VITE_APP_ACCESS_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Falha explícita se o secret estiver em falta (senão o bundle fica sem senha).
      - name: Verificar secret de login
        run: |
          if [ -z "$VITE_APP_ACCESS_PASSWORD" ]; then
            echo "::error::VITE_APP_ACCESS_PASSWORD está vazio. Adicione o secret em Settings → Secrets → Actions, OU em Settings → Environments → github-pages → Environment secrets (mesmo nome)."
            exit 1
          fi

      # Reforço explícito: o secret tem de existir neste repositório (TiendaNube/…), não só num fork.
      - run: npm run build
        env:
          VITE_APP_ACCESS_PASSWORD: ${{ secrets.VITE_APP_ACCESS_PASSWORD }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
